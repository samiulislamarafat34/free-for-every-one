<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanat - নোটস</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-body">
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <div class="notes-container">
    <h1 style="margin-bottom: 30px; display: flex; align-items: center; gap: 16px;">
      <i class="fas fa-sticky-note" style="background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
      নোটস
      <span style="font-size: 16px; font-weight: 400; color: var(--text-muted); margin-left: auto;">
        <span id="noteCount">০</span>টি নোট
      </span>
    </h1>

    <div class="notes-sidebar">
      <!-- Notes List -->
      <div class="notes-list-panel glass">
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" onclick="createNewNote()">
          <i class="fas fa-plus"></i> নতুন নোট
        </button>
        <div id="notesList">
          <p style="color: var(--text-muted); text-align: center; padding: 20px;">কোনো নোট নেই</p>
        </div>
      </div>

      <!-- Editor -->
      <div class="note-editor-panel glass">
        <input type="text" id="noteTitle" class="note-title-input" placeholder="নোটের শিরোনাম...">
        <textarea id="noteContent" class="note-content-area" placeholder="আপনার নোট লিখুন..."></textarea>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="saveNote()">
          <i class="fas fa-save"></i> সংরক্ষণ
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bar glass">
    <a href="/dashboard.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>ড্যাশবোর্ড</span>
    </a>
    <a href="/storage.html" class="nav-item">
      <i class="fas fa-folder"></i>
      <span>স্টোরেজ</span>
    </a>
    <a href="/notes.html" class="nav-item active">
      <i class="fas fa-sticky-note"></i>
      <span>নোটস</span>
    </a>
    <a href="/tools.html" class="nav-item">
      <i class="fas fa-tools"></i>
      <span>টুলস</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <i class="fas fa-user"></i>
      <span>প্রোফাইল</span>
    </a>
  </nav>

  <script src="animations.js"></script>
  <script>
    let notes = JSON.parse(localStorage.getItem('amanat_notes') || '[]');
    let currentNoteId = null;

    function renderNotes() {
      const list = document.getElementById('notesList');
      document.getElementById('noteCount').textContent = toBangla(notes.length);

      if (!notes.length) {
        list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">কোনো নোট নেই</p>';
        return;
      }

      list.innerHTML = notes.map(note => `
        <div class="note-item ${note.id === currentNoteId ? 'active' : ''}" onclick="loadNote('${note.id}')">
          <div class="note-title">${note.title || 'শিরোনামহীন'}</div>
          <div class="note-preview">${note.content.substring(0, 40)}...</div>
          <div class="note-date">${note.date || ''}</div>
        </div>
      `).join('');
    }

    function createNewNote() {
      const note = {
        id: Date.now().toString(),
        title: '',
        content: '',
        date: new Date().toLocaleDateString('bn-BD')
      };
      notes.unshift(note);
      currentNoteId = note.id;
      localStorage.setItem('amanat_notes', JSON.stringify(notes));
      document.getElementById('noteTitle').value = '';
      document.getElementById('noteContent').value = '';
      renderNotes();
    }

    function loadNote(id) {
      currentNoteId = id;
      const note = notes.find(n => n.id === id);
      if (note) {
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content;
      }
      renderNotes();
    }

    function saveNote() {
      if (!currentNoteId) return;
      const idx = notes.findIndex(n => n.id === currentNoteId);
      if (idx !== -1) {
        notes[idx].title = document.getElementById('noteTitle').value;
        notes[idx].content = document.getElementById('noteContent').value;
        notes[idx].date = new Date().toLocaleDateString('bn-BD');
        localStorage.setItem('amanat_notes', JSON.stringify(notes));
        showToast('নোট সংরক্ষিত!', 'success');
        renderNotes();
      }
    }

    // Auto-save
    document.getElementById('noteContent').addEventListener('input', debounce(saveNote, 2000));

    renderNotes();
  </script>
</body>
</html>
